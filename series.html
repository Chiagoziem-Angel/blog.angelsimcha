<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Series — Angel Simcha</title>
  <meta name="description" content="31-day writing series on faith, wisdom, and the word of God." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .series-hero {
      padding: 72px 24px 56px;
      border-bottom: 1px solid var(--border);
    }

    .series-hero h1 {
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      margin-bottom: 16px;
    }

    .series-hero p {
      font-size: 1rem;
      color: var(--ink-mid);
      max-width: 520px;
      line-height: 1.75;
    }

    .series-grid {
      padding: 64px 24px 80px;
    }

    .series-grid .container {
      max-width: 760px;
    }

    .series-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 48px;
    }

    .series-card__header {
      padding: 32px 36px 28px;
      border-bottom: 1px solid var(--border);
    }

    .series-card__tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
      margin-bottom: 16px;
      color: #fff;
    }

    .series-card__title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .series-card__tagline {
      font-size: 0.95rem;
      color: var(--ink-mid);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .series-card__desc {
      font-size: 0.9rem;
      color: var(--ink-soft);
      line-height: 1.75;
    }

    .edition-block {
      padding: 24px 36px;
      border-bottom: 1px solid var(--border);
    }

    .edition-block:last-child {
      border-bottom: none;
    }

    .edition-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      cursor: pointer;
      user-select: none;
    }

    .edition-header__left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .edition-label {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
    }

    .edition-period {
      font-size: 0.82rem;
      color: var(--ink-soft);
    }

    .edition-status {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--ink-soft);
    }

    .edition-status.live {
      border-color: #4CAF50;
      color: #2E7D32;
    }

    .edition-status.coming {
      border-color: var(--gold);
      color: var(--gold);
    }

    .edition-status.complete {
      border-color: var(--border);
      color: var(--ink-soft);
    }

    .edition-toggle {
      font-size: 1rem;
      color: var(--ink-soft);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .edition-block.open .edition-toggle {
      transform: rotate(180deg);
    }

    .days-grid {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      padding-bottom: 8px;
    }

    .edition-block.open .days-grid {
      display: grid;
    }

    .day-pill {
      display: flex;
      flex-direction: column;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.82rem;
      line-height: 1.4;
      text-decoration: none;
      color: var(--ink);
      transition: border-color 0.2s, background 0.2s;
    }

    .day-pill:hover {
      border-color: var(--gold);
      background: #fff;
    }

    .day-pill.coming {
      opacity: 0.4;
      pointer-events: none;
    }

    .day-pill__num {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .day-pill__title {
      font-weight: 500;
      color: var(--ink);
    }

    .day-pill__date {
      font-size: 0.75rem;
      color: var(--ink-soft);
      margin-top: 4px;
    }

    .days-skeleton {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .day-skel {
      height: 72px;
      border-radius: 6px;
      background: var(--cream-dark);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    @media (max-width: 600px) {

      .series-card__header,
      .edition-block {
        padding: 20px;
      }

      .days-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      }
    }
  </style>
</head>

<body>

  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Angel<br>Simcha</a>
      <ul class="nav__links">
        <li><a href="index.html">Letters</a></li>
        <li><a href="series.html" class="active">Series</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <a href="index.html#subscribe" class="btn btn--gold">Subscribe</a>
    </div>
  </nav>

  <section class="series-hero">
    <div class="container">
      <h1>Series</h1>
      <p>Thirty-one days at a time. Deep dives into God's word, journal entries, and lessons from the road — published
        in seasons.</p>
    </div>
  </section>

  <section class="series-grid">
    <div class="container">
      <div id="series-container"></div>
    </div>
  </section>

  <footer class="footer">
    <p>© 2026 Angel Simcha. All rights reserved.</p>
  </footer>

  <!-- Single source of truth — edit this file to add new series -->
  <script src="series-config.js"></script>
  <script>
    async function buildPage() {
      const container = document.getElementById('series-container');

      container.innerHTML = SERIES_CONFIG.map((series, si) => `
        <div class="series-card">
          <div class="series-card__header">
            <span class="series-card__tag" style="background:${series.color}">${series.shortTitle}</span>
            <h2 class="series-card__title">${series.title}</h2>
            <p class="series-card__tagline">${series.tagline}</p>
            <p class="series-card__desc">${series.description}</p>
          </div>
          <div class="editions-list" id="editions-${series.id}">
            ${series.editions.map((ed, ei) => `
              <div class="edition-block ${ei === 0 ? 'open' : ''}" id="ed-${series.id}-${ed.num}">
                <div class="edition-header" onclick="toggleEdition('ed-${series.id}-${ed.num}')">
                  <div class="edition-header__left">
                    <span class="edition-label">${ed.label}</span>
                    <span class="edition-period">${ed.period}</span>
                    <span class="edition-status ${ed.status}">${statusLabel(ed.status)}</span>
                  </div>
                  <span class="edition-toggle">↓</span>
                </div>
                <div class="days-grid" id="days-${series.id}-${ed.num}">
                  <div class="days-skeleton">
                    ${[1, 2, 3, 4].map(() => '<div class="day-skel"></div>').join('')}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      // Fetch days for every series + edition from Supabase
      for (const series of SERIES_CONFIG) {
        for (const ed of series.editions) {
          loadDays(series.id, ed.num, series.color);
        }
      }
    }

    async function loadDays(seriesId, edition, color) {
      const gridEl = document.getElementById(`days-${seriesId}-${edition}`);
      if (!gridEl) return;
      try {
        const res = await fetch(`/api/get-series-days?series=${seriesId}&edition=${edition}`);
        const data = await res.json();
        if (!res.ok || !data.posts) throw new Error();
        if (data.posts.length === 0) {
          gridEl.innerHTML = `<p style="font-size:0.88rem;color:var(--ink-soft);font-style:italic;padding:8px 0;">No entries yet.</p>`;
          return;
        }
        gridEl.innerHTML = data.posts.map(post => {
          const label = post.day === 0 ? 'Intro' : `Day ${String(post.day).padStart(2, '0')}`;
          const url = `series/${seriesId}/${edition}/${post.day}`;
          return `
            <a class="day-pill" href="${url}">
              <span class="day-pill__num" style="color:${color}">${label}</span>
              <span class="day-pill__title">${post.title}</span>
              <span class="day-pill__date">${post.date_label || ''}</span>
            </a>`;
        }).join('');
      } catch {
        gridEl.innerHTML = `<p style="font-size:0.82rem;color:var(--ink-soft);">Couldn't load entries.</p>`;
      }
    }

    function toggleEdition(id) {
      document.getElementById(id)?.classList.toggle('open');
    }

    function statusLabel(s) {
      if (s === 'live') return 'Active';
      if (s === 'coming') return 'Coming Soon';
      if (s === 'complete') return 'Complete';
      return s;
    }

    document.addEventListener('DOMContentLoaded', buildPage);
  </script>
</body>

</html>
