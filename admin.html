<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Angel Simcha</title>

  <!-- Quill rich text editor -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F7F5F0;
      color: #1A1814;
      min-height: 100vh;
    }

    /* ── Login Screen ──────────────────────────────────── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: #fff;
      border: 1px solid #DDD8CE;
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-card h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 0.88rem;
      color: #7A756C;
      margin-bottom: 28px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #DDD8CE;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
    }

    .login-card input:focus {
      border-color: #C9A227;
    }

    .login-card .error {
      color: #C94040;
      font-size: 0.82rem;
      margin-bottom: 10px;
      display: none;
    }

    /* ── Admin App ─────────────────────────────────────── */
    #admin-app {
      display: none;
    }

    .admin-header {
      background: #fff;
      border-bottom: 1px solid #DDD8CE;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .admin-header h1 {
      font-size: 1rem;
      font-weight: 600;
    }

    .admin-header a {
      font-size: 0.82rem;
      color: #7A756C;
      text-decoration: none;
    }

    .admin-body {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Form Fields ───────────────────────────────────── */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field-row.three {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .field-row.full {
      grid-template-columns: 1fr;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7A756C;
    }

    .field input,
    .field select {
      padding: 10px 14px;
      border: 1px solid #DDD8CE;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1A1814;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus,
    .field select:focus {
      border-color: #C9A227;
    }

    /* ── Quill Editor ──────────────────────────────────── */
    .editor-wrap {
      margin-bottom: 24px;
    }

    .editor-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7A756C;
      margin-bottom: 8px;
      display: block;
    }

    #editor-container {
      background: #fff;
      border: 1px solid #DDD8CE;
      border-radius: 0 0 6px 6px;
      min-height: 420px;
      font-size: 1.05rem;
      line-height: 1.85;
    }

    .ql-toolbar {
      border-radius: 6px 6px 0 0;
      border-color: #DDD8CE !important;
    }

    .ql-container {
      border-color: #DDD8CE !important;
      font-size: 1.05rem;
    }

    /* Style Quill output to match site */
    .ql-editor blockquote {
      border-left: 3px solid #C9A227;
      padding-left: 20px;
      font-style: italic;
      color: #3D3A34;
    }

    /* ── Actions ───────────────────────────────────────── */
    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
    }

    .btn-publish {
      padding: 12px 28px;
      background: #C9A227;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-publish:hover {
      background: #a8841a;
    }

    .btn-publish:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-draft {
      padding: 12px 28px;
      background: transparent;
      color: #7A756C;
      font-size: 0.95rem;
      font-weight: 500;
      border: 1px solid #DDD8CE;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-draft:hover {
      border-color: #C9A227;
      color: #C9A227;
    }

    /* ── Status Message ────────────────────────────────── */
    .status-msg {
      padding: 14px 18px;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-top: 16px;
      display: none;
    }

    .status-msg.success {
      background: #F0EBE0;
      border-left: 3px solid #C9A227;
      color: #3D3A34;
      display: block;
    }

    .status-msg.error {
      background: #FDF0F0;
      border-left: 3px solid #C94040;
      color: #7A2020;
      display: block;
    }

    /* ── Preview strip ─────────────────────────────────── */
    .preview-link {
      font-size: 0.82rem;
      color: #7A756C;
      margin-left: auto;
    }

    @media (max-width: 600px) {

      .field-row,
      .field-row.three {
        grid-template-columns: 1fr;
      }

      .admin-body {
        padding: 24px 16px 60px;
      }
    }
  </style>
</head>

<body>

  <!-- ── Login Screen ───────────────────────────────────── -->
  <div id="login-screen">
    <div class="login-card">
      <h1>Angel Simcha</h1>
      <p>Admin — Series Editor</p>
      <p class="error" id="login-error">Wrong password. Try again.</p>
      <input type="password" id="password-input" placeholder="Enter admin password"
        onkeydown="if(event.key==='Enter') login()" />
      <button class="btn-publish" style="width:100%;" onclick="login()">Enter</button>
    </div>
  </div>

  <!-- ── Admin App ──────────────────────────────────────── -->
  <div id="admin-app">
    <header class="admin-header">
      <h1>Series Editor</h1>
      <div style="display:flex;gap:20px;align-items:center;">
        <a href="series.html" target="_blank">← View series page</a>
        <a href="#" onclick="logout()" style="color:#C94040;">Logout</a>
      </div>
    </header>

    <div class="admin-body">

      <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:28px;">
        Publish a New Day
      </h2>

      <!-- Row 1: Series + Edition + Day -->
      <div class="field-row three">
        <div class="field">
          <label>Series</label>
          <select id="field-series">
            <option value="apad">A Proverb A Day (APAD)</option>
            <option value="wisdom">31 Days of Empowered Wisdom</option>
          </select>
        </div>
        <div class="field">
          <label>Edition #</label>
          <input type="number" id="field-edition" value="3" min="1" />
        </div>
        <div class="field">
          <label>Day # (0 = intro)</label>
          <input type="number" id="field-day" value="1" min="0" max="31" />
        </div>
      </div>

      <!-- Row 2: Title + Date -->
      <div class="field-row">
        <div class="field">
          <label>Title</label>
          <input type="text" id="field-title" placeholder="e.g. Proverbs 1 — The Beginning of Wisdom" />
        </div>
        <div class="field">
          <label>Display Date</label>
          <input type="text" id="field-date" placeholder="e.g. May 2, 2026" />
        </div>
      </div>

      <!-- Rich Text Editor -->
      <div class="editor-wrap">
        <span class="editor-label">Content</span>
        <div id="editor-container"></div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn-publish" id="btn-publish" onclick="savePost('live')">
          Publish Live
        </button>
        <button class="btn-draft" onclick="savePost('draft')">
          Save as Draft
        </button>
        <span class="preview-link" id="preview-link"></span>
      </div>

      <div class="status-msg" id="status-msg"></div>

      <!-- Divider -->
      <hr style="border:none;border-top:1px solid #DDD8CE;margin:48px 0 32px;" />

      <!-- Quick lookup to load existing post for editing -->
      <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:16px;">
        Load Existing Post to Edit
      </h2>
      <div class="field-row three">
        <div class="field">
          <label>Series</label>
          <select id="load-series">
            <option value="apad">APAD</option>
            <option value="wisdom">Empowered Wisdom</option>
          </select>
        </div>
        <div class="field">
          <label>Edition</label>
          <input type="number" id="load-edition" value="3" min="1" />
        </div>
        <div class="field">
          <label>Day</label>
          <input type="number" id="load-day" value="1" min="0" />
        </div>
      </div>
      <button class="btn-draft" style="margin-top:4px;" onclick="loadPost()">Load Post</button>
      <div class="status-msg" id="load-status"></div>

    </div>
  </div>

  <script>
    /* ── Password Gate ────────────────────────────────────── */
    let adminPassword = '';

    function login() {
      const input = document.getElementById('password-input').value.trim();
      if (!input) return;
      adminPassword = input;

      // Store in session (not localStorage — cleared when tab closes)
      sessionStorage.setItem('admin_pw', input);

      // Quick server-side check by making a test save with empty data
      // We just show the app — real auth happens on save
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-app').style.display = 'block';
      initEditor();
    }

    function logout() {
      sessionStorage.removeItem('admin_pw');
      location.reload();
    }

    // Auto-login if password stored in session
    window.addEventListener('DOMContentLoaded', () => {
      const stored = sessionStorage.getItem('admin_pw');
      if (stored) {
        adminPassword = stored;
        document.getElementById('password-input').value = stored;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-app').style.display = 'block';
        initEditor();
      }
    });

    /* ── Quill Editor ─────────────────────────────────────── */
    let quill;

    function initEditor() {
      if (quill) return;
      quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Write your content here...',
        modules: {
          toolbar: [
            [{ header: [2, 3, false] }],
            ['bold', 'italic'],
            ['blockquote'],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['link'],
            ['clean'],
          ],
        },
      });
    }

    /* ── Save Post ────────────────────────────────────────── */
    async function savePost(status) {
      const series = document.getElementById('field-series').value;
      const edition = document.getElementById('field-edition').value;
      const day = document.getElementById('field-day').value;
      const title = document.getElementById('field-title').value.trim();
      const dateLabel = document.getElementById('field-date').value.trim();
      const content = quill.root.innerHTML;
      const msgEl = document.getElementById('status-msg');
      const btn = document.getElementById('btn-publish');

      if (!title) return showStatus(msgEl, 'error', 'Title is required.');
      if (!content || content === '<p><br></p>') return showStatus(msgEl, 'error', 'Content is empty.');

      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        const res = await fetch('/api/save-series-post', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-password': adminPassword,
          },
          body: JSON.stringify({ series_id: series, edition, day, title, content, date_label: dateLabel, status }),
        });

        const data = await res.json();

        if (!res.ok) {
          if (res.status === 401) {
            showStatus(msgEl, 'error', 'Wrong password. Logout and try again.');
          } else {
            showStatus(msgEl, 'error', `Error: ${JSON.stringify(data.error)}`);
          }
        } else {
          const url = `series-day.html?series=${series}&edition=${edition}&day=${day}`;
          showStatus(msgEl, 'success', `
            ✓ ${status === 'live' ? 'Published' : 'Saved as draft'} successfully!
            <a href="${url}" target="_blank" style="color:#C9A227;margin-left:8px;">View post →</a>
          `);
        }
      } catch (err) {
        showStatus(msgEl, 'error', `Network error: ${err.message}`);
      }

      btn.disabled = false;
      btn.textContent = 'Publish Live';
    }

    /* ── Load Existing Post ───────────────────────────────── */
    async function loadPost() {
      const series = document.getElementById('load-series').value;
      const edition = document.getElementById('load-edition').value;
      const day = document.getElementById('load-day').value;
      const msgEl = document.getElementById('load-status');

      try {
        const res = await fetch(`/api/get-series-post?series=${series}&edition=${edition}&day=${day}`);
        const data = await res.json();

        if (!res.ok || !data.post) {
          return showStatus(msgEl, 'error', 'Post not found.');
        }

        const p = data.post;
        document.getElementById('field-series').value = p.series_id;
        document.getElementById('field-edition').value = p.edition;
        document.getElementById('field-day').value = p.day;
        document.getElementById('field-title').value = p.title;
        document.getElementById('field-date').value = p.date_label || '';
        quill.root.innerHTML = p.content;

        showStatus(msgEl, 'success', `Loaded: "${p.title}". Edit above and hit Publish to update.`);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        showStatus(msgEl, 'error', `Error: ${err.message}`);
      }
    }

    /* ── Helpers ──────────────────────────────────────────── */
    function showStatus(el, type, html) {
      el.className = `status-msg ${type}`;
      el.innerHTML = html;
    }
  </script>
</body>

</html>
